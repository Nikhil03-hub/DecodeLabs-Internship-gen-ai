<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Chatbot with Memory — DecodeLabs GenAI Week 1</title>
  <meta name="description" content="Custom AI chatbot that remembers your conversation — DecodeLabs Generative AI Internship Week 1" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js" defer></script>

  <link rel="stylesheet" href="/static/css/theme.css" />
  <link rel="stylesheet" href="/static/css/chat.css" />

  <style>
    html, body { height: 100%; overflow: hidden; }
    body { display: flex; flex-direction: column; }

    /* ── Layout ── */
    .chat-layout {
      flex: 1;
      min-height: 0;
      display: grid;
      grid-template-columns: 1fr 260px;
      gap: 0;
      overflow: hidden;
    }

    /* ── Chat Panel ── */
    .chat-panel {
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
      overflow: hidden;
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 1.25rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.875rem;
      scroll-behavior: smooth;
    }

    .typing-wrapper { padding: 0 1.5rem 0.5rem; }

    /* ── Messages ── */
    .message {
      display: flex;
      gap: 0.75rem;
      align-items: flex-start;
      animation: msg-in 0.22s ease-out;
    }

    @keyframes msg-in {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* AI messages: small avatar circle on left, content-sized bubble */
    .message-assistant {
      flex-direction: row;
    }

    .message-assistant .msg-body {
      min-width: 0;
    }

    .message-assistant .message-bubble {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 4px var(--radius) var(--radius) var(--radius);
      max-width: 82%;
    }

    /* User messages: right-aligned gradient bubble, naturally content-sized */
    .message-user {
      flex-direction: column;
      align-items: flex-end;
    }

    .message-user .message-bubble {
      background: linear-gradient(135deg, var(--brand), var(--brand-2));
      color: #fff;
      border-radius: var(--radius) 4px var(--radius) var(--radius);
      max-width: 75%;
    }

    .message-user .message-meta {
      justify-content: flex-end;
    }

    .message-avatar {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.6rem;
      font-weight: 700;
      flex-shrink: 0;
      letter-spacing: 0.02em;
    }

    .assistant-avatar {
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: var(--text-dim);
      font-size: 0.625rem;
    }

    .message-bubble {
      padding: 0.75rem 1rem;
      border-radius: var(--radius);
      font-size: 0.9375rem;
      line-height: 1.65;
      word-break: break-word;
    }

    .message-meta {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 0.3rem;
      font-size: 0.6875rem;
      color: var(--text-muted);
    }

    /* ── Composer ── */
    .chat-composer {
      padding: 0.75rem 1.25rem 1rem;
      border-top: 1px solid var(--border);
      background: rgba(11, 15, 23, 0.7);
      backdrop-filter: blur(8px);
    }

    .composer-inner {
      display: flex;
      gap: 0.75rem;
      align-items: flex-end;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.5rem 0.5rem 0.5rem 0.875rem;
      transition: border-color var(--transition), box-shadow var(--transition);
    }

    .composer-inner:focus-within {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.12);
    }

    .composer-textarea {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: var(--font-ui);
      font-size: 0.9375rem;
      line-height: 1.6;
      resize: none;
      padding: 0.25rem 0;
      max-height: 160px;
      overflow-y: auto;
    }

    .composer-textarea::placeholder { color: var(--text-muted); }

    .composer-actions {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-shrink: 0;
    }

    .composer-hint {
      display: flex;
      justify-content: flex-end;
      margin-top: 0.3rem;
      padding: 0 0.25rem;
    }

    /* ── History Panel ── */
    .history-panel {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg);
    }

    .history-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .history-title {
      font-size: 0.8125rem;
      font-weight: 600;
      color: var(--text-dim);
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .history-list {
      flex: 1;
      overflow-y: auto;
      padding: 0.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.125rem;
    }

    .history-item {
      padding: 0.625rem 0.75rem;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: background var(--transition);
      position: relative;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      border: 1px solid transparent;
    }

    .history-item:hover { background: var(--surface); border-color: var(--border); }

    .history-item.active {
      background: rgba(99,102,241,0.08);
      border-color: rgba(99,102,241,0.2);
    }

    .history-item-content {
      flex: 1;
      min-width: 0;
    }

    .history-item-title {
      font-size: 0.8125rem;
      color: var(--text-dim);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      line-height: 1.3;
    }

    .history-item.active .history-item-title { color: var(--text); font-weight: 500; }

    .history-item-time {
      font-size: 0.6875rem;
      color: var(--text-muted);
      margin-top: 0.2rem;
    }

    .history-item-delete {
      opacity: 0;
      flex-shrink: 0;
      background: transparent;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 0.25rem;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all var(--transition);
    }

    .history-item:hover .history-item-delete { opacity: 1; }
    .history-item-delete:hover { color: var(--danger); background: rgba(239,68,68,0.1); }

    .history-new-btn {
      width: 100%;
      margin: 0.5rem;
      width: calc(100% - 1rem);
    }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      html, body { overflow: auto; }
      .chat-layout { grid-template-columns: 1fr; }
      .history-panel { display: none; }
      .chat-panel { border-right: none; }
    }
  </style>
</head>
<body>

<!-- ═══ NAVBAR ═══ -->
<nav class="navbar" role="banner">
  <a href="/" class="navbar-brand" aria-label="Nexus AI">
    <svg width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <path d="M14 2L25.5 8.5V21.5L14 28L2.5 21.5V8.5L14 2Z" stroke="url(#nb-g)" stroke-width="1.5" fill="rgba(99,102,241,0.08)"/>
      <circle cx="14" cy="14" r="2.5" fill="url(#nb-g)"/>
      <line x1="14" y1="6.5" x2="14" y2="11.5" stroke="url(#nb-g)" stroke-width="1.25" stroke-linecap="round"/>
      <line x1="14" y1="16.5" x2="14" y2="21.5" stroke="url(#nb-g)" stroke-width="1.25" stroke-linecap="round"/>
      <line x1="8.5" y1="10.5" x2="12" y2="12.75" stroke="url(#nb-g)" stroke-width="1.25" stroke-linecap="round"/>
      <line x1="16" y1="15.25" x2="19.5" y2="17.5" stroke="url(#nb-g)" stroke-width="1.25" stroke-linecap="round"/>
      <line x1="8.5" y1="17.5" x2="12" y2="15.25" stroke="url(#nb-g)" stroke-width="1.25" stroke-linecap="round"/>
      <line x1="16" y1="12.75" x2="19.5" y2="10.5" stroke="url(#nb-g)" stroke-width="1.25" stroke-linecap="round"/>
      <circle cx="14" cy="5.5" r="1.2" fill="url(#nb-g)" opacity="0.75"/>
      <circle cx="14" cy="22.5" r="1.2" fill="url(#nb-g)" opacity="0.75"/>
      <circle cx="8" cy="10" r="1.2" fill="url(#nb-g)" opacity="0.75"/>
      <circle cx="20" cy="18" r="1.2" fill="url(#nb-g)" opacity="0.75"/>
      <circle cx="8" cy="18" r="1.2" fill="url(#nb-g)" opacity="0.75"/>
      <circle cx="20" cy="10" r="1.2" fill="url(#nb-g)" opacity="0.75"/>
      <defs>
        <linearGradient id="nb-g" x1="2.5" y1="2" x2="25.5" y2="28" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="#6366F1"/>
          <stop offset="100%" stop-color="#A855F7"/>
        </linearGradient>
      </defs>
    </svg>
    <span class="wordmark">Nexus AI</span>
  </a>
</nav>

<!-- ═══ MAIN LAYOUT ═══ -->
<main class="chat-layout" role="main">

  <!-- LEFT: Chat Panel -->
  <section class="chat-panel" aria-label="Chat">
    <div class="chat-messages" id="chat-messages" role="log" aria-live="polite" aria-label="Conversation">
      <div class="empty-state" id="empty-state">
        <div class="empty-state-icon">💬</div>
        <div class="empty-state-title">Start a conversation</div>
        <p class="empty-state-desc">Your chats are saved in the panel →<br/>Click any past conversation to continue.</p>
        <button class="btn btn-ghost btn-sm" id="demo-btn" style="margin-top:0.5rem;">
          <span>Run memory test</span>
        </button>
      </div>
    </div>

    <!-- Typing indicator -->
    <div class="typing-wrapper" id="typing-indicator" hidden>
      <div class="message message-assistant">
        <div class="message-avatar assistant-avatar">AI</div>
        <div>
          <div class="message-bubble">
            <div class="typing-indicator">
              <div class="typing-dot"></div>
              <div class="typing-dot"></div>
              <div class="typing-dot"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Composer -->
    <div class="chat-composer">
      <div class="composer-inner">
        <textarea
          id="user-input"
          class="composer-textarea"
          placeholder="Type a message… (Enter to send, Shift+Enter for new line)"
          rows="1"
          maxlength="4000"
          aria-label="Message input"
        ></textarea>
        <div class="composer-actions">
          <button id="send-btn" class="btn btn-primary" aria-label="Send message">
            <i data-lucide="send" style="width:15px;height:15px;"></i>
            <span>Send</span>
          </button>
          <button id="new-chat-btn" class="btn btn-ghost btn-sm" title="New chat" aria-label="New chat">
            <i data-lucide="plus-circle" style="width:14px;height:14px;"></i>
            <span class="hide-mobile">New Chat</span>
          </button>
        </div>
      </div>
      <div class="composer-hint">
        <span id="char-count" class="text-muted text-xs">0 / 4000</span>
      </div>
    </div>
  </section>

  <!-- RIGHT: Conversation History Panel -->
  <aside class="history-panel" aria-label="Conversation history">
    <div class="history-header">
      <div class="history-title">
        <i data-lucide="message-square" style="width:13px;height:13px;color:var(--brand)"></i>
        Conversations
      </div>
      <button class="btn-icon" id="new-chat-side-btn" title="New conversation" aria-label="New conversation">
        <i data-lucide="square-pen" style="width:13px;height:13px;"></i>
      </button>
    </div>
    <div class="history-list" id="history-list" aria-label="Past conversations" aria-live="polite">
      <div style="padding:2rem 1rem;text-align:center;color:var(--text-muted);font-size:0.8125rem;line-height:1.6;">
        No conversations yet.<br>Start chatting!
      </div>
    </div>
  </aside>

</main>

<!-- Toast container -->
<div id="toast-container" role="region" aria-label="Notifications" aria-live="assertive"></div>

<script src="/static/js/app.js" defer></script>
<script defer>
  document.addEventListener('DOMContentLoaded', () => {
    if (window.lucide) lucide.createIcons();
  });
</script>
</body>
</html>
