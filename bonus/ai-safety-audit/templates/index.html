<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Safety Audit — DecodeLabs GenAI Bonus</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/theme.css" />
  <style>
    html, body { height: 100%; }
    body { display: flex; flex-direction: column; }

    .audit-layout {
      flex: 1;
      display: grid;
      grid-template-columns: 320px 1fr;
      min-height: 0;
      overflow: hidden;
    }

    /* Left panel */
    .control-panel {
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      padding: 1.25rem;
      gap: 1.25rem;
    }

    .category-list { display: flex; flex-direction: column; gap: 0.375rem; }
    .cat-checkbox {
      display: flex; align-items: center; gap: 0.625rem;
      padding: 0.5rem 0.75rem;
      border-radius: 0.5rem;
      cursor: pointer;
      font-size: 0.8125rem;
      transition: background 0.15s;
    }
    .cat-checkbox:hover { background: var(--surface); }
    .cat-checkbox input[type="checkbox"] { accent-color: var(--brand); width: 14px; height: 14px; }
    .cat-badge {
      margin-left: auto;
      font-size: 0.7rem;
      padding: 0.1rem 0.4rem;
      border-radius: 0.25rem;
      background: var(--surface);
      color: var(--text-muted);
    }

    .score-ring-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      padding: 1rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 0.75rem;
    }
    .score-ring-wrap svg { width: 100px; height: 100px; }
    .score-ring-text { font-size: 1.75rem; font-weight: 700; font-family: var(--font-mono); }
    .score-ring-label { font-size: 0.75rem; color: var(--text-muted); text-align: center; }

    .summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; }
    .summary-stat {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 0.5rem;
      padding: 0.625rem 0.75rem;
      text-align: center;
    }
    .summary-stat .stat-n { font-size: 1.25rem; font-weight: 700; }
    .summary-stat .stat-l { font-size: 0.7rem; color: var(--text-muted); }

    /* Right panel */
    .results-panel {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .results-header {
      padding: 1.25rem 1.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-shrink: 0;
    }
    .results-header h2 { font-size: 1rem; font-weight: 600; margin: 0; flex: 1; }

    .results-list {
      flex: 1;
      overflow-y: auto;
      padding: 1.25rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.625rem;
    }

    .results-empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: var(--text-muted);
      gap: 0.75rem;
    }
    .results-empty .empty-icon { font-size: 3rem; }

    .result-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 0.75rem;
      overflow: hidden;
    }
    .result-card-header {
      display: flex;
      align-items: center;
      gap: 0.625rem;
      padding: 0.75rem 1rem;
      cursor: pointer;
      transition: background 0.15s;
    }
    .result-card-header:hover { background: rgba(255,255,255,0.03); }
    .verdict-icon { font-size: 1rem; flex-shrink: 0; }
    .result-label { font-size: 0.875rem; font-weight: 500; flex: 1; }
    .result-id { font-size: 0.7rem; font-family: var(--font-mono); color: var(--text-muted); }
    .severity-bar-wrap {
      display: flex; align-items: center; gap: 0.5rem;
      flex-shrink: 0; width: 100px;
    }
    .severity-bar {
      flex: 1; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden;
    }
    .severity-fill { height: 100%; border-radius: 2px; transition: width 0.4s; }
    .sev-num { font-size: 0.75rem; font-family: var(--font-mono); color: var(--text-muted); width: 24px; }

    .result-card-body {
      display: none;
      padding: 0.75rem 1rem 1rem;
      border-top: 1px solid var(--border);
      font-size: 0.8125rem;
    }
    .result-card.open .result-card-body { display: block; }

    .result-prompt, .result-response {
      background: var(--bg);
      border-radius: 0.375rem;
      padding: 0.625rem 0.75rem;
      font-size: 0.75rem;
      font-family: var(--font-mono);
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 150px;
      overflow-y: auto;
      margin-top: 0.375rem;
    }
    .result-flags {
      display: flex; flex-wrap: wrap; gap: 0.375rem; margin-top: 0.5rem;
    }
    .flag-chip {
      font-size: 0.65rem;
      padding: 0.15rem 0.5rem;
      border-radius: 0.25rem;
      background: rgba(239,68,68,0.15);
      color: #ef4444;
      border: 1px solid rgba(239,68,68,0.3);
    }

    /* progress bar while running */
    .audit-progress {
      display: none;
      padding: 0.75rem 1.5rem;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .audit-progress.visible { display: block; }
    .progress-bar-outer {
      height: 4px; background: var(--border); border-radius: 2px; overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--brand), var(--brand-2));
      border-radius: 2px;
      transition: width 0.3s;
    }
    .progress-label {
      font-size: 0.75rem; color: var(--text-muted); margin-bottom: 0.375rem;
    }
  </style>
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar">
    <div class="navbar-inner">
      <div class="navbar-brand">
        <div class="brand-icon">🛡️</div>
        <div class="brand-name">AI Safety Audit</div>
      </div>
    </div>
  </nav>

  <div class="audit-layout">

    <!-- Left: Controls -->
    <div class="control-panel">

      <!-- Score ring -->
      <div class="score-ring-wrap" id="score-ring-wrap" style="display:none;">
        <svg viewBox="0 0 100 100">
          <circle cx="50" cy="50" r="40" fill="none" stroke="var(--border)" stroke-width="8"/>
          <circle id="score-ring-fill" cx="50" cy="50" r="40" fill="none" stroke="var(--brand)" stroke-width="8"
            stroke-linecap="round" stroke-dasharray="251.2" stroke-dashoffset="251.2"
            transform="rotate(-90 50 50)" style="transition: stroke-dashoffset 0.8s, stroke 0.4s;"/>
        </svg>
        <div class="score-ring-text" id="score-number">—</div>
        <div class="score-ring-label">Safety Score / 100</div>
      </div>

      <!-- Summary stats -->
      <div class="summary-grid" id="summary-grid" style="display:none;">
        <div class="summary-stat">
          <div class="stat-n" id="cnt-safe" style="color:#22c55e;">—</div>
          <div class="stat-l">✅ Safe</div>
        </div>
        <div class="summary-stat">
          <div class="stat-n" id="cnt-unsafe" style="color:#ef4444;">—</div>
          <div class="stat-l">❌ Unsafe</div>
        </div>
        <div class="summary-stat">
          <div class="stat-n" id="cnt-partial" style="color:#f59e0b;">—</div>
          <div class="stat-l">⚠️ Partial</div>
        </div>
        <div class="summary-stat">
          <div class="stat-n" id="cnt-sev">—</div>
          <div class="stat-l">Avg Severity</div>
        </div>
      </div>

      <div>
        <div style="font-size:0.8125rem;font-weight:600;margin-bottom:0.75rem;">Select categories</div>
        <div class="category-list" id="category-list">
          <!-- Populated by JS -->
        </div>
      </div>

      <button class="btn btn-primary shimmer" id="run-btn">
        🛡️ Run Safety Audit
      </button>

      <button class="btn btn-ghost" id="download-btn" style="display:none;">
        ⬇ Export Report (.md)
      </button>

      <!-- Custom prompt tester -->
      <div style="border-top:1px solid var(--border);padding-top:1rem;">
        <div style="font-size:0.8125rem;font-weight:600;margin-bottom:0.5rem;">Test Custom Prompt</div>
        <textarea id="custom-prompt" placeholder="Enter any prompt to test…" style="width:100%;min-height:80px;background:var(--surface);border:1px solid var(--border);border-radius:0.5rem;color:var(--text);font-family:var(--font-mono);font-size:0.75rem;padding:0.625rem;resize:vertical;"></textarea>
        <button class="btn btn-ghost" id="custom-run-btn" style="margin-top:0.5rem;width:100%;font-size:0.8125rem;">
          Test this prompt
        </button>
      </div>

    </div>

    <!-- Right: Results -->
    <div class="results-panel">
      <div class="results-header">
        <h2>Audit Results</h2>
        <span class="text-sm text-muted" id="results-count"></span>
      </div>

      <div class="audit-progress" id="audit-progress">
        <div class="progress-label" id="progress-label">Running…</div>
        <div class="progress-bar-outer">
          <div class="progress-bar-fill" id="progress-bar" style="width:0%"></div>
        </div>
      </div>

      <div class="results-list" id="results-list">
        <div class="results-empty">
          <div class="empty-icon">🛡️</div>
          <h3 style="font-size:1rem;font-weight:600;color:var(--text);margin:0;">No audit run yet</h3>
          <p style="font-size:0.8125rem;margin:0;">Select categories and click "Run Safety Audit" to begin.</p>
        </div>
      </div>
    </div>

  </div>

  <div id="toast-container" style="position:fixed;bottom:1.25rem;right:1.25rem;z-index:9999;display:flex;flex-direction:column;gap:0.5rem;"></div>

  <script src="/static/js/app.js"></script>
</body>
</html>
